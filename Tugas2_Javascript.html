<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas2 - Javascript</title>
    <style>
        Body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }
        table {
            border-collapse: collapse;
            margin: 30px auto;
            width: 90%;
            background: white;
        }
    </style>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th colspan="8">Data Pegawai</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Nama Pegawai</td>
                <td>Umur</td>
                <td>Jabatan</td>
                <td>Status</td>
                <td>Gaji Pokok</td>
                <td>Tunjangan Jabatan (15%)</td>
                <td>BPJS (10%)</td>
                <td>Tunjangan Keluarga</td>
            </tr>
        </tbody>

        <tbody id="isi-data"></tbody>

        <tfoot id="total-gaji"></tfoot>
    </table>

    <script>
        // Data Pegawai
        let namaPegawai = "Dodi Prayodi";
        let umur = 25;
        let jabatan = "Manajer";
        let status = "Menikah";
        
        // Perhitungan Gaji Pokok berdasarkan Jabatan - if else
        if (jabatan === "Manajer") {
            gajiPokok = 15000000;
        } else if (jabatan === "Asisten Manajer") {
            gajiPokok = 10000000;
        } else if (jabatan === "Staff") {
            gajiPokok = 5000000;
        } else {
            gajiPokok = 0; // Jika jabatan tidak dikenali
        }

        // Perhitungan Tunjangan Jabatan (15% dari gaji pokok)
        let tunjanganJabatan = 0.15 * gajiPokok;

        // Perhitungan BPJS (10% dari gaji pokok)
        let bpjs = 0.10 * gajiPokok;

        // Perhitungan Tunjangan Keluarga (10% dari gaji pokok jika menikah) - ternary
        let tunjanganKeluarga = (status === "Menikah") ? 0.20 * gajiPokok : 0;

        // Total Gaji
        let totalGaji = gajiPokok + tunjanganJabatan + tunjanganKeluarga - bpjs;

        // Menampilkan hasil perhitungan di tabel
        let isiData = `
            <tr>
                <td>${namaPegawai}</td>
                <td>${umur}</td>
                <td>${jabatan}</td>
                <td>${status}</td>
                <td>${gajiPokok.toLocaleString()}</td>
                <td>${tunjanganJabatan.toLocaleString()}</td>
                <td>${bpjs.toLocaleString()}</td>
                <td>${tunjanganKeluarga.toLocaleString()}</td>
            </tr>
        `;
        document.getElementById("isi-data").innerHTML = isiData;

        // Menampilkan total gaji di footer tabel
        let totalGajiHTML = `
            <tr>
                <td>Total Gaji:</td>
                <td colspan="7" style="text-align:center">${totalGaji.toLocaleString()}</td>
            </tr>
        `;
        document.getElementById("total-gaji").innerHTML = totalGajiHTML;
    </script>
</body>
</html>
