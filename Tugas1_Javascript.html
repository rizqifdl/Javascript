<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas1 - Javascript</title>
</head>
<body>
    <script>
        // Luas Persegi Panjang
        let p = 15; // Variabel untuk panjang
        let l = 7.5; // Variabel untuk lebar
        let luasPersegiPanjang = p * l; // Rumus luas persegi panjang
        let x = "Panjang = " + p + "<br>"; // Menyimpan informasi panjang dalam variabel x
        let y = "Lebar = " + l + "<br>"; // Menyimpan informasi lebar dalam variabel y
        document.write("<i><b>Luas Persegi Panjang</b></i>" + "<br>" + x + y + "Luas Persegi Panjang = " + luasPersegiPanjang); // Menampilkan hasil luas persegi panjang

        document.write("<hr>"); // Menambahkan garis horizontal sebagai pemisah

        // Luas Persegi
        let s = 8; // Variabel untuk sisi persegi
        let luasPersegi = s * s; // Rumus luas persegi
        let a = "Sisi = " + s + "<br>"; // Menyimpan informasi sisi dalam variabel a
        document.write("<i><b>Luas Persegi</b></i>" + "<br>" + a + "Luas Persegi = " + luasPersegi); // Menampilkan hasil luas persegi
    
        document.write("<hr>");

        // Luas Segitiga
        let alas = 9; // Variabel untuk alas segitiga
        let tinggi = 6; // Variabel untuk tinggi segitiga
        let luasSegitiga = 0.5 * alas * tinggi; // Rumus luas segitiga
        let b = "Alas = " + alas + "<br>"; // Menyimpan informasi alas dalam variabel b
        let c = "Tinggi = " + tinggi + "<br>"; // Menyimpan informasi tinggi dalam variabel c
        document.write("<i><b>Luas Segitiga</b></i>" + "<br>" + b + c + "Luas Segitiga = " + luasSegitiga); // Menampilkan hasil luas segitiga
    </script>
</body>
</html>
